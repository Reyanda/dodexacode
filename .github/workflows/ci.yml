name: ci

on:
  push:
  pull_request:

jobs:
  build-and-smoke:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: swift build

      - name: Smoke Test
        run: ./scripts/smoke-test.sh
